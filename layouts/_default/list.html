{{ define "main" }}
<h2>{{ .Title }}</h2>

{{ if eq .Title "Categories" }}
    <!-- 分类汇总页：显示所有分类 -->
    <ul>
    {{ range .Site.Taxonomies.categories }}
        <li>
            <a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> ({{ .Count }})
        </li>
    {{ end }}
    </ul>
{{ else }}
    <!-- 普通列表页（如某个分类下的文章列表） -->
    <ul>
    {{ range .Pages }}
        <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
            <small>{{ .Date.Format "2006-01-02" }}</small>
        </li>
    {{ end }}
    </ul>
{{ end }}
{{ end }}
